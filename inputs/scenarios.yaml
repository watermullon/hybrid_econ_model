  jon_base_case:
    description: "Deal 1 base case — 116-unit Class C value-add multifamily, Southwest US. $10M purchase, $3M equity, $7M senior debt at 70% LTV. NOI $555k Y1 ramping to $930k stabilized. 7.5% IO debt. Refi Y4/Y7 at 70% LTV. HF 13% base. Cashflow routing 60/25/15."
    years: 20
    real_estate_model:
      mode: "bottom_up"
    real_estate:
      initial_noi_yield: 0.055
      annual_noi_growth: 0.03
      annual_nav_appreciation: 0.03
      gross_rent_yield: 0.10
    hedge_fund:
      annual_returns: [0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13, 0.13]
    cashflow_routing:
      enabled: true
      re_cashflow:
        lp_distribution_pct: 0.60
        hf_reinvestment_pct: 0.25
        reserve_pct: 0.15
      hf_harvest:
        lp_distribution_pct: 0.60
        hf_reinvestment_pct: 0.25
        reserve_pct: 0.15

  jon_downside_case:
    description: "Deal 1 downside — slower lease-up, lower NOI ramp, higher capex, tighter refi. HF -15% Y1 then recovery."
    years: 20
    real_estate_model:
