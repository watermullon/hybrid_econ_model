scenarios:
  base_hit_everyone_happy:
    description: "Moderate real estate and hedge fund performance baseline; tests whether ordinary cash routing can reach the LP cash hurdle."
    years: 20
    real_estate:
      initial_noi_yield: 0.075
      annual_noi_growth: 0.025
      annual_nav_appreciation: 0.04
      gross_rent_yield: 0.12
    hedge_fund:
      annual_returns: [0.30, 0.15, 0.35, 0.12, 0.24, 0.08, 0.40, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06, 0.06]

  fast_success_crypto_bull:
    description: "Strong hedge fund sleeve over a shorter horizon; tests whether liquid alpha can accelerate LP cash returns."
    years: 20
    real_estate:
      initial_noi_yield: 0.07
      annual_noi_growth: 0.02
      annual_nav_appreciation: 0.03
      gross_rent_yield: 0.11
    hedge_fund:
      annual_returns: [0.60, 0.80, 0.30, 0.25, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15, 0.15]

  slow_grind:
