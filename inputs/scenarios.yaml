            3: 155000
            4: 90000
            5: 42000
          recurring_capex_pct_of_noi: 0.05
        valuation:
          annual_value_growth: 0.01
        refinance:
          refi_ltv: 0.60
          refi_costs_pct: 0.03
          target_years: [7, 10, 15]
    real_estate:
      initial_noi_yield: 0.055
      annual_noi_growth: 0.03
      annual_nav_appreciation: 0.03
      gross_rent_yield: 0.10
    hedge_fund:
