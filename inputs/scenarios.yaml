      annual_noi_growth: 0.02
      annual_nav_appreciation: 0.025
      gross_rent_yield: 0.11
    hedge_fund:
      annual_returns: [-0.70, -0.20, 0.05, 0.05, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04]

