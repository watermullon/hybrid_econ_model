scenarios:
  base_hit_everyone_happy:
    description: "Moderate real estate and hedge fund performance baseline; tests whether ordinary cash routing can reach the LP cash hurdle."
    years: 8
    real_estate:
      initial_noi_yield: 0.075
      annual_noi_growth: 0.025
      annual_nav_appreciation: 0.04
      gross_rent_yield: 0.12
    hedge_fund:
      annual_returns: [0.30, 0.15, 0.35, 0.12, 0.24, 0.08, 0.40, 0.06]

  fast_success_crypto_bull:
    description: "Strong hedge fund sleeve over a shorter horizon; tests whether liquid alpha can accelerate LP cash returns."
    years: 5
    real_estate:
      initial_noi_yield: 0.07
      annual_noi_growth: 0.02
      annual_nav_appreciation: 0.03
      gross_rent_yield: 0.11
    hedge_fund:
      annual_returns: [0.60, 0.80, 0.30, 0.25, 0.15]

  slow_grind:
    description: "Slow real estate growth and uneven hedge fund returns; tests long-duration cash distribution drift."
    years: 15
    real_estate:
      initial_noi_yield: 0.065
      annual_noi_growth: 0.015
      annual_nav_appreciation: 0.02
      gross_rent_yield: 0.10
    hedge_fund:
      annual_returns: [0.19, -0.05, 0.14, 0.03, 0.16, 0.07, 0.25, 0.05, 0.13, -0.02, 0.24, 0.14, 0.33, 0.13, 0.06]

  hedge_fund_failure_re_survival:
    description: "Hedge fund sleeve suffers major impairment, while real estate survives and cash-flows."
    years: 12
    real_estate:
      initial_noi_yield: 0.075
      annual_noi_growth: 0.02
      annual_nav_appreciation: 0.025
      gross_rent_yield: 0.11
    hedge_fund:
      annual_returns: [-0.70, -0.20, 0.05, 0.05, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04, 0.04]

  real_estate_distress_crypto_success:
    description: "Real estate underperforms while hedge fund returns are strong; tests whether liquid gains can offset property stress."
    years: 10
    real_estate:
      initial_noi_yield: 0.045
      annual_noi_growth: -0.01
      annual_nav_appreciation: -0.03
      gross_rent_yield: 0.08
    hedge_fund:
      annual_returns: [0.60, 0.40, 0.25, 0.35, 0.10, 0.45, 0.05, 0.12, 0.15, 0.25]

  exceptional_dynasty_outcome:
    description: "Both sleeves perform strongly; tests the upper-end residual asset outcome after LP cash extinguishment."
    years: 10
    real_estate:
      initial_noi_yield: 0.085
      annual_noi_growth: 0.04
      annual_nav_appreciation: 0.08
      gross_rent_yield: 0.13
    hedge_fund:
      annual_returns: [0.60, 0.50, 0.30, 0.20, 0.15, 0.20, 0.10, 0.28, 0.08, 0.19]

  liquidity_trap:
    description: "High real estate NAV growth with low refinance capacity; tests the gap between paper value and LP cash liquidity."
    years: 10
    liquidity:
      max_refinance_or_sale_capacity_pct_of_re_nav: 0.05
    real_estate:
      initial_noi_yield: 0.07
      annual_noi_growth: 0.03
      annual_nav_appreciation: 0.07
      gross_rent_yield: 0.11
    hedge_fund:
      annual_returns: [0.10, 0.38, 0.22, 0.05, 0.25, 0.05, 0.34, 0.04, 0.34, 0.04]

  failure_never_reaches_hurdle:
    description: "Both sleeves disappoint; LP never reaches 2.0x."
    years: 12
    real_estate:
      initial_noi_yield: 0.045
      annual_noi_growth: 0.00
      annual_nav_appreciation: -0.01
      gross_rent_yield: 0.08
    hedge_fund:
      annual_returns: [-0.20, 0.10, 0.15, 0.03, 0.24, 0.04, 0.13, 0.18, -0.12, 0.28, 0.12, 0.08]
